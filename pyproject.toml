[project]
name = "aurora-memory"
version = "0.2.0"
description = "AURORA narrative memory — local-first runtime with coherence checking and self-narrative."
requires-python = ">=3.10"
authors = [{name="AURORA Contributors"}]
readme = "README.md"
license = {text = "Proprietary"}
dependencies = [
  "numpy>=1.24",
  "scipy>=1.11",
  "networkx>=3.2",
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
  "orjson>=3.9",
  "textual>=8.1.0",
]

[project.optional-dependencies]
api = [
  "fastapi>=0.110",
  "uvicorn>=0.27",
]
bailian = [
  "openai>=1.12",
]
ark = [
  "openai>=1.12",
  "volcengine-python-sdk[ark]",
]
benchmark = [
  "datasets>=2.14",
  "rouge-score>=0.1.2",
]
dev = [
  "pytest>=8.0",
  "pytest-cov>=4.1",
  "mypy>=1.8",
  "ruff>=0.1",
  "radon>=6.0",
]
production = [
  "aurora-memory[api,bailian]",
]
all = [
  "aurora-memory[api,bailian,ark,benchmark,dev]",
]

[project.scripts]
aurora = "aurora.interfaces.cli.entry:main"

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aurora*"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
