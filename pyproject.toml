[project]
name = "aurora-memory"
version = "1.0.0"
description = "Aurora Seed v1 - Mac-first substrate for a long-term digital soul."
requires-python = ">=3.10"
authors = [{ name = "AURORA Contributors" }]
readme = "README.md"
license = { text = "Proprietary" }
dependencies = [
  "numpy>=1.24",
  "pydantic>=2.6",
  "fastapi>=0.110",
  "uvicorn>=0.27",
  "onnxruntime>=1.24.3",
  "tokenizers>=0.22.2",
  "huggingface-hub>=1.6.0",
  "python-dotenv>=1.2.2",
  "rich>=14.3.3",
  "networkx>=3.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "mypy>=1.8",
  "ruff>=0.1",
]

[project.scripts]
aurora = "aurora.surface_api.cli:main"

[tool.ruff]
line-length = 100

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aurora*"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
ignore_missing_imports = true
