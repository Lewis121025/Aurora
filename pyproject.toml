[project]
name = "aurora-memory"
version = "0.2.0"
description = "AURORA narrative memory — production pack with causal inference, coherence checking, and self-narrative."
requires-python = ">=3.10"
authors = [{name="AURORA Contributors"}]
readme = "README.md"
license = {text = "Proprietary"}
dependencies = [
  "numpy>=1.24",
  "scipy>=1.11",
  "networkx>=3.2",
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
  "orjson>=3.9",
]

[project.optional-dependencies]
api = [
  "fastapi>=0.110",
  "uvicorn>=0.27",
]
ark = [
  "openai>=1.12",
]
jobs = [
  "apscheduler>=3.10",
]
postgres = [
  "asyncpg>=0.29.0",
  "pgvector>=0.2.5",
]
redis = [
  "redis>=5.0.0",
  "hiredis>=2.2.0",
]
kafka = [
  "aiokafka>=0.10.0",
]
telemetry = [
  "prometheus-client>=0.20",
  "opentelemetry-api>=1.23",
  "opentelemetry-sdk>=1.23",
]
faiss = [
  "faiss-cpu>=1.7.4",
]
faiss-gpu = [
  "faiss-gpu>=1.7.4",
]
mcp = [
  # MCP SDK when available
]
benchmark = [
  "datasets>=2.14",
  "rouge-score>=0.1.2",
]
dev = [
  "pytest>=8.0",
  "pytest-cov>=4.1",
  "aiosqlite>=0.19.0",
]
# Production bundle with all storage backends
production = [
  "aurora-memory[api,ark,postgres,redis,kafka,telemetry,faiss]",
]
all = [
  "aurora-memory[api,ark,jobs,postgres,redis,kafka,telemetry,faiss,dev]",
]

[project.scripts]
aurora = "aurora.cli:main"

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aurora*"]
