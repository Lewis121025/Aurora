name: Type Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Compile sources
      run: |
        python -m compileall -q aurora

    - name: Run mypy
      run: |
        mypy aurora --show-error-codes --pretty

    - name: Type coverage report
      run: |
        mypy aurora --html-report mypy-report --any-exprs-report mypy-report

    - name: Upload type coverage
      uses: actions/upload-artifact@v6
      if: always() && hashFiles('mypy-report/**') != ''
      with:
        name: type-coverage-report
        path: mypy-report/
