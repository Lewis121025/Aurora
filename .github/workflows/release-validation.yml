name: Release Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  release-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Compile sources
      run: |
        python -m compileall -q aurora tests

    - name: Run tests
      run: |
        pytest -q

    - name: Run mypy
      run: |
        mypy aurora tests --show-error-codes --pretty

    - name: Run ruff
      run: |
        ruff check aurora tests
