name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  validation:
    name: Validation (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run repository checks
        run: make check

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  future-smoke:
    name: Future Smoke (Python 3.15-dev)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.15-dev"
          allow-prereleases: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Import package
        run: uv run python -c "import aurora"

      - name: Compile sources
        run: uv run python -m compileall -q aurora tests

      - name: Run tests
        run: uv run pytest -q
